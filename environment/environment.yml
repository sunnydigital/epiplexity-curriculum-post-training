name: grpo-train
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  # PyTorch 2.6+ required by TRL for FSDPModule (torch.distributed.fsdp)
  # Verify Big Purple CUDA driver version with: nvidia-smi
  - pytorch::pytorch>=2.6
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=12.1
  - pip:
    - transformers>=4.40
    - datasets>=2.18
    - trl>=0.9
    - accelerate>=0.29
    - peft>=0.10
    - sentencepiece>=0.1.99
    - evaluate>=0.4
    - PyYAML>=6.0
