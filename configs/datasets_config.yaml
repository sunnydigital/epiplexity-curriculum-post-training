# Dataset configuration
# floor_weight: minimum sampling probability to prevent dataset starvation

floor_weight: 0.02
max_samples_per_dataset: null  # set to integer (e.g. 2000) for smoke tests

# Curriculum scheduling defaults (overridden by CLI --curriculum, --temp-start, etc.)
curriculum:
  strategy: "uniform"          # uniform | high_first | low_first | high_constant | low_constant | anneal_to_high | single
  temp_start: 0.1              # starting temperature for annealing strategies
  temp_end: 5.0                # ending temperature for annealing strategies
  uniform_mix: 0.1             # fraction of uniform distribution mixed in (starvation prevention)
  weight_update_interval: 50   # recompute weights every N steps

# Per-dataset floor overrides (optional — null means use global floor_weight)
per_dataset_floor:
  gsm8k: null
  math: null
  humaneval: 0.08              # slight floor boost: code may be under-scored by probe
  mbpp: 0.08
  mmlu: null
  arc: null
  triviaqa: null
  boolq: null
